# Дефолты ниже позволяют поднять стек сразу после клонирования: `docker compose up`
# работает без .env. Файл .env (см. .env.example) нужен только чтобы переопределить
# значения по умолчанию, например задать свои креды MinIO.
x-minio-credentials: &minio-credentials
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}

services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      <<: *minio-credentials
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  grpc:
    build: .
    container_name: imagesender-grpc
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "50051:50051"
    environment:
      <<: *minio-credentials
      # Внутри docker-сети MinIO доступен по имени сервиса, а не localhost
      MINIO_ENDPOINT: minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-images}
      MINIO_MAX_BYTES: ${MINIO_MAX_BYTES:-0}
      MINIO_WARN_THRESHOLD: ${MINIO_WARN_THRESHOLD:-0.8}

  client:
    build: .
    container_name: imagesender-client
    # Интерактивный CLI — в общий `docker compose up` не поднимается,
    # запускается отдельно: `docker compose run --rm client`
    profiles: ["cli"]
    depends_on:
      - grpc
    environment:
      GRPC_HOST: grpc
      GRPC_PORT: 50051
      # Относительные пути, введённые в клиенте, ищутся внутри этой директории
      DATA_DIR: /data
      # Позволяет клиенту транслировать абсолютные хостовые пути в путь
      # внутри контейнера (см. resolve_path() в client.py)
      HOST_PROJECT_DIR: ${PWD}
      # То же самое, но для домашней директории — так можно указывать пути
      # вроде /home/user/screen.png, не копируя файл в проект. Маунт read-only,
      # поэтому сохранить (download) файл вне /data не получится.
      HOME_DIR: /home_host
      HOST_HOME_DIR: ${HOME}
    # Монтируем проект в /data, чтобы пути к файлам на хосте (например,
    # test_photos/photo.png) были доступны в контейнере как /data/test_photos/photo.png.
    # Домашнюю директорию монтируем отдельно и только для чтения — исключительно
    # чтобы клиент мог найти файлы для загрузки за пределами проекта.
    volumes:
      - .:/data:z
      - ${HOME}:/home_host:ro
    # На хостах с SELinux (Fedora/RHEL) :ro-маунта домашней директории
    # недостаточно — SELinux запретит чтение. Перемаркировать её через :z,
    # как /data, нельзя: это относительно небольшая директория проекта,
    # а :z на всей домашней директории перепишет метки у всех файлов в ней,
    # что и медленно, и затрагивает файлы, не имеющие отношения к проекту.
    # Поэтому вместо этого отключаем SELinux-изоляцию для самого контейнера.
    security_opt:
      - label:disable
    # Без этого контейнер пишет файлы в /data от root, и на хосте их потом
    # нельзя удалить/изменить без sudo. Если ваш UID/GID отличается от 1000,
    # выполните `export UID GID` перед `docker compose up`/`run`.
    user: "${UID:-1000}:${GID:-1000}"
    stdin_open: true
    tty: true
    command: ["python", "client.py"]

volumes:
  minio_data:
