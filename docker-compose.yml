services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  grpc:
    build: .
    container_name: imagesender-grpc
    depends_on:
      - minio
    ports:
      - "50051:50051"
    environment:
      # Внутри docker-сети MinIO доступен по имени сервиса, а не localhost
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-images}
      MINIO_MAX_BYTES: ${MINIO_MAX_BYTES:-0}
      MINIO_WARN_THRESHOLD: ${MINIO_WARN_THRESHOLD:-0.8}

volumes:
  minio_data:
