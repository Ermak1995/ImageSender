services:
  minio: 
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password12345
    command: server /data --console-address ":9001"
    volumes: 
      - minio_data:/data

volumes: 
  minio_data: